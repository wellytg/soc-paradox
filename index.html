<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Day Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .btn-gradient {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center space-y-8">
        <div class="space-y-4">
            <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl">
                Research Day
            </h1>
            <p class="text-lg text-slate-400">
                Welcome to the SOC Strategic Alignment Research. Click the button below to start the simulation.
            </p>
        </div>
        <div>
            <a href="https://wellytg.github.io/soc-paradox-sim" 
               class="inline-block px-8 py-4 text-xl font-bold text-white btn-gradient rounded-full shadow-lg uppercase tracking-widest">
                Start Simulation
            </a>
        </div>
        <div class="pt-8 border-t border-slate-800">
            <p class="text-sm text-slate-500 italic">
                Strategic Alignment Research Project
            </p>
        </div>
    </div>
</body>
</html>
